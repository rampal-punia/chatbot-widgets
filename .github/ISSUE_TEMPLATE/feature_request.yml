name: Feature Request
description: Suggest a feature for an Aparsoft chatbot widget package
labels: ["enhancement"]
body:
  - type: dropdown
    id: package
    attributes:
      label: Package
      description: Which package should this feature be added to?
      options:
        - "@aparsoft/chatbot-react"
        - "@aparsoft/chatbot-nextjs"
        - "@aparsoft/chatbot-vue"
        - "@aparsoft/chatbot-angular"
        - "WordPress plugin"
        - "All packages"
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this feature solve?
      placeholder: "I want to be able to..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like this to work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What other approaches have you tried or considered?
